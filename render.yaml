services:
  - type: web
    name: zeelandcamper-site
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rc-autoverkoop
          property: connectionString
      - key: SITE_USERNAME
        value: bram
      - key: SITE_PASSWORD
        value: "1234"
      - key: SESSION_SECRET
        generateValue: true
      - key: MOBILOX_EMAIL
        sync: false
      - key: MOBILOX_PASSWORD
        sync: false
      - key: ZEELANDNET_USERNAME
        sync: false
      - key: ZEELANDNET_PASSWORD
        sync: false
      - key: ZEELANDNET_LOGIN_TYPE
        value: gast
      - key: ZEELANDNET_WEBSITE_URL
        value: https://www.zeelandcamper.nl/campers-te-koop/
