<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo overzicht | ZeelandCamper</title>
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/todos.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="ZeelandCamper home">
        <img src="/assets/logo-zeelandcamper-web.jpg" alt="ZeelandCamper">
      </a>
      <nav class="top-nav" aria-label="Hoofdnavigatie">
        <a href="/">Website</a>
        <button class="nav-button" id="logout-button" type="button">Uitloggen</button>
      </nav>
    </header>

    <main class="dashboard-shell">
      <section class="dashboard-hero">
        <p class="eyebrow">Dashboard</p>
        <h1>Todo overzicht</h1>
        <p>Alle open en afgeronde todo punten per camper.</p>
      </section>

      <section class="choice-bar" aria-label="Keuzes">
        <a class="secondary-button small-button" href="/dashboard">Camper overzicht</a>
        <a class="primary-button small-button" href="/todos">Todo overzicht</a>
        <a class="secondary-button small-button" id="first-detail-link" href="/camper-detail.html">Eerste camper</a>
      </section>

      <section class="overview-panel" aria-labelledby="todos-title">
        <div class="manager-header">
          <div>
            <p class="eyebrow">Actiepunten</p>
            <h2 id="todos-title">Todo punten</h2>
          </div>
          <span class="count-pill" id="todo-count">0</span>
        </div>
        <div class="todo-overview" id="todo-overview"></div>
      </section>
    </main>
  </body>
</html>
