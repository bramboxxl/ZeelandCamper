<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nieuwe camper | ZeelandCamper</title>
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/new-camper.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="ZeelandCamper home">
        <img src="/assets/logo-zeelandcamper-web.jpg" alt="ZeelandCamper">
      </a>
      <nav class="top-nav" aria-label="Hoofdnavigatie">
        <a href="/">Website</a>
        <button class="nav-button" id="logout-button" type="button">Uitloggen</button>
      </nav>
    </header>

    <main class="dashboard-shell">
      <section class="dashboard-hero">
        <p class="eyebrow">Dashboard</p>
        <h1>Nieuwe camper</h1>
        <p>Voeg een nieuwe camper toe en vul kentekendata automatisch aan.</p>
      </section>

      <section class="choice-bar" aria-label="Keuzes">
        <a class="secondary-button small-button" href="/dashboard">Overzicht</a>
        <a class="secondary-button small-button" href="/op-het-oog">Op het oog</a>
        <a class="primary-button small-button" href="/new-camper">Nieuwe camper</a>
        <button class="secondary-button small-button" id="rdw-lookup-button" type="button">RDW & Finnik data</button>
        <button class="primary-button small-button" form="new-vehicle-form" type="submit">Opslaan</button>
      </section>

      <form class="vehicle-form detail-form" id="new-vehicle-form">
        <div class="form-header">
          <div>
            <p class="eyebrow">Nieuwe invoer</p>
            <h2>Camperdata</h2>
          </div>
          <span class="count-pill">Nieuw</span>
        </div>

        <section class="rdw-panel" aria-labelledby="rdw-title">
          <div class="todo-header">
            <div>
              <p class="eyebrow">Kentekendata</p>
              <h3 id="rdw-title">RDW & Finnik data</h3>
            </div>
            <span class="form-message" id="rdw-message" role="status"></span>
          </div>
          <div class="rdw-highlights">
            <div>
              <span>Afmetingen</span>
              <strong id="rdw-dimensions">-</strong>
            </div>
            <div>
              <span>Zitplaatsen</span>
              <strong id="rdw-seats">-</strong>
            </div>
            <div>
              <span>Eigenaren</span>
              <strong id="finnik-owners">-</strong>
            </div>
          </div>
          <div class="rdw-grid" id="rdw-grid"></div>
        </section>

        <div class="form-row">
          <label>
            ID
            <input type="text" name="sourceId" placeholder="ZC021">
          </label>
          <label>
            Kenteken
            <input type="text" name="licensePlate" placeholder="AA-123-B">
          </label>
        </div>
        <label>
          Status
          <select name="status">
            <option value="Op het oog">Op het oog</option>
            <option value="intake en contract">intake en contract</option>
            <option value="staat te koop">staat te koop</option>
            <option value="verkocht">verkocht</option>
            <option value="gaat niet door">gaat niet door</option>
          </select>
        </label>
        <label>
          Merk en type
          <input type="text" name="title" placeholder="Bijv. Hymer B-Klasse" required>
        </label>
        <div class="form-row">
          <label>
            Kleur
            <input type="text" name="color" placeholder="Wit">
          </label>
          <label>
            Bron
            <input type="text" name="source" placeholder="Makelaar">
          </label>
        </div>
        <div class="form-row">
          <label>
            Bouwjaar
            <input type="text" name="year" inputmode="numeric" placeholder="2020">
          </label>
          <label>
            Kilometerstand
            <input type="text" name="mileage" inputmode="numeric" placeholder="42000">
          </label>
        </div>
        <div class="form-row">
          <label>
            Verkoopprijs
            <input type="text" name="price" inputmode="numeric" placeholder="68950">
          </label>
          <label>
            Aanschaf
            <input type="text" name="purchasePrice" inputmode="numeric" placeholder="60000">
          </label>
        </div>
        <label>
          Opmerking / actie
          <textarea name="notes" rows="5"></textarea>
        </label>
        <label>
          Aanvullende informatie
          <textarea name="additionalInfo" rows="4"></textarea>
        </label>
        <input type="hidden" name="brand">
        <input type="hidden" name="model">
        <p class="form-message" id="vehicle-message" role="status"></p>
      </form>
    </main>
  </body>
</html>
