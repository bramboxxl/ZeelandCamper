<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Camper overzicht | ZeelandCamper</title>
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/dashboard.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="ZeelandCamper home">
        <img src="/assets/logo-zeelandcamper-web.jpg" alt="ZeelandCamper">
      </a>
      <nav class="top-nav" aria-label="Hoofdnavigatie">
        <a href="/">Website</a>
        <button class="nav-button" id="logout-button" type="button">Uitloggen</button>
      </nav>
    </header>

    <main class="dashboard-shell">
      <section class="dashboard-hero">
        <p class="eyebrow">Dashboard</p>
        <h1>Camper overzicht</h1>
        <p>Klik op een camper om de detaildata te bekijken en te bewerken.</p>
      </section>

      <section class="choice-bar" aria-label="Keuzes">
        <a class="primary-button small-button" href="/dashboard">Overzicht</a>
        <a class="secondary-button small-button" id="first-detail-link" href="/camper-detail.html">Eerste camper</a>
      </section>

      <section class="overview-panel" aria-labelledby="vehicles-title">
        <div class="manager-header">
          <div>
            <p class="eyebrow">Excel database</p>
            <h2 id="vehicles-title">Campers</h2>
          </div>
          <span class="count-pill" id="vehicle-count">0</span>
        </div>
        <div class="overview-grid" id="vehicle-list"></div>
      </section>
    </main>
  </body>
</html>
