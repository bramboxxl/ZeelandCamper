<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Op het oog campers | ZeelandCamper</title>
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/op-het-oog.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="ZeelandCamper home">
        <img src="/assets/logo-zeelandcamper-web.jpg" alt="ZeelandCamper">
      </a>
      <nav class="top-nav" aria-label="Hoofdnavigatie">
        <a href="/">Website</a>
        <button class="nav-button" id="logout-button" type="button">Uitloggen</button>
      </nav>
    </header>

    <main class="dashboard-shell">
      <section class="dashboard-hero">
        <p class="eyebrow">Dashboard</p>
        <h1>Op het oog</h1>
        <p>Campers met status Op het oog.</p>
      </section>

      <section class="choice-bar" aria-label="Keuzes">
        <a class="secondary-button small-button" href="/dashboard">Overzicht</a>
        <a class="primary-button small-button" href="/op-het-oog">Op het oog</a>
        <a class="secondary-button small-button" href="/new-camper">Nieuwe camper</a>
        <a class="secondary-button small-button" href="/todos">Todo overzicht</a>
      </section>

      <section class="overview-panel" aria-labelledby="watch-title">
        <div class="manager-header">
          <div>
            <p class="eyebrow">Selectie</p>
            <h2 id="watch-title">Op het oog campers</h2>
          </div>
          <span class="count-pill" id="vehicle-count">0</span>
        </div>
        <div class="overview-grid" id="vehicle-list"></div>
      </section>
    </main>
  </body>
</html>
